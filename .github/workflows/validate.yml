name: Validate

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - name: Restore
        run: dotnet restore DawishContentStudio.sln
      - name: Build
        run: dotnet build DawishContentStudio.sln --configuration Release --no-restore
      - name: Test
        run: dotnet test DawishContentStudio.sln --configuration Release --no-build
